site_name: GLIMPSE Architecture
site_url: https://fancysnake.github.io/glimpse-architecture/
site_description: A framework-agnostic clean architecture pattern for Python projects
repo_url: https://github.com/fancysnake/glimpse-architecture
repo_name: fancysnake/glimpse-architecture

theme:
  name: material
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: deep purple
      accent: amber
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: deep purple
      accent: amber
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
  features:
    - navigation.sections
    - navigation.indexes
    - navigation.expand
    - navigation.top
    - content.code.copy
    - toc.integrate

markdown_extensions:
  - admonition
  - pymdownx.details
  - pymdownx.superfences
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.highlight:
      anchor_linenums: true
  - attr_list
  - def_list
  - toc:
      permalink: true

nav:
  - Home: index.md
  - Layers:
    - Overview: layers/index.md
    - pacts: layers/pacts.md
    - specs: layers/specs.md
    - mills: layers/mills.md
    - links: layers/links.md
    - gates: layers/gates.md
    - inits: layers/inits.md
    - edges: layers/edges.md
  - Slicing:
    - Vocabulary & Rules: slicing/index.md
    - File Layout: slicing/file-layout.md
  - Patterns & Red Flags: patterns/index.md
  - Guides:
    - Django: guides/django.md
    - Import Linter: guides/import-linter.md
  - Claude Skill: claude-skill/index.md
  - Changelog: changelog.md
